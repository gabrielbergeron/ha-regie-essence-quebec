name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
no-changes-template: "- No user-facing changes in this release."
version-resolver:
  major:
    labels:
      - major
      - breaking-change
  minor:
    labels:
      - enhancement
      - feature
  patch:
    labels:
      - bug
      - bugfix
      - fix
      - dependencies
      - documentation
      - maintenance
  default: patch
categories:
  - title: "Features"
    labels:
      - enhancement
      - feature
  - title: "Fixes"
    labels:
      - bug
      - bugfix
      - fix
  - title: "Documentation"
    labels:
      - documentation
  - title: "Maintenance"
    labels:
      - maintenance
      - dependencies
change-title-escapes: '\<*_&'
template: |
  ## Changes

  $CHANGES
